name: iOS Build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      tag:
        description: '关联的 Release tag（如 v4.4.3），留空则仅上传 artifact'
        required: false
        default: ''

jobs:
  build-ios:
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode 16
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16'

      - name: Verify Xcode version
        run: |
          xcodebuild -version
          xcrun --show-sdk-path

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.6'
          channel: 'stable'

      - name: Install dependencies (pin iOS-compatible device_info_plus)
        run: |
          flutter pub get
          flutter pub add device_info_plus:^12.1.0
          flutter pub get

      - name: Install CocoaPods dependencies
        run: cd ios && pod install

      - name: Patch device_info_plus iOS selector for Xcode compatibility
        run: |
          set -euo pipefail
          FOUND=0
          while IFS= read -r PLUGIN_FILE; do
            FOUND=1
            perl -0777 -i -pe 's/\[\[NSProcessInfo\s+processInfo\]\s+isiOSAppOnVision\]/NO/g' "${PLUGIN_FILE}"
            echo "Patched: ${PLUGIN_FILE}"
          done < <(find "$HOME/.pub-cache/hosted/pub.dev" "$GITHUB_WORKSPACE/ios/.symlinks/plugins" -type f -name "FPPDeviceInfoPlusPlugin.m" 2>/dev/null)
          if [ "${FOUND}" -eq 0 ]; then
            echo "FPPDeviceInfoPlusPlugin.m not found."
            exit 1
          fi
          if grep -RE "\[\[NSProcessInfo[[:space:]]+processInfo\][[:space:]]+isiOSAppOnVision\]" "$HOME/.pub-cache/hosted/pub.dev" "$GITHUB_WORKSPACE/ios/.symlinks/plugins" 2>/dev/null; then
            echo "Patch verification failed: selector call still exists."
            exit 1
          fi

      - name: Verify resolved key deps
        run: |
          grep -En "device_info_plus|win32_registry|win32" pubspec.lock
      - name: Build IPA (unsigned)
        run: |
          chmod +x ./scripts/build_unsigned_ipa.sh
          ./scripts/build_unsigned_ipa.sh release
          cp build/ios/ipa/Runner-release-unsigned.ipa build/ios/ipa/refuge-ios.ipa

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: refuge-ios.ipa
          path: build/ios/ipa/refuge-ios.ipa

      - name: Attach to GitHub Release
        if: ${{ github.event.inputs.tag != '' }}
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.event.inputs.tag }}
          files: build/ios/ipa/refuge-ios.ipa
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
